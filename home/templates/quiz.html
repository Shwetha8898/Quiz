{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Quiz</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
        crossorigin="anonymous">
  <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
  {% include 'navbar.html' %}
<div class="container mt-5 pt-5">
  <div id="app">
    {% verbatim %}
    <div class="card shadow-sm mb-4" v-for="question in questions" :key="question.uid">
      <div class="card-body">
        <h4 class="card-title mb-3" style="color:#6b4f27;">{{ question.question }}</h4>
        <div class="form-check mb-2" v-for="ans in question.answer" :key="ans.answer">
          <input class="form-check-input"
                 type="radio"
                 :name="question.uid"
                 :value="ans.answer"
                 v-model="question.selected"
                 :id="question.uid + '-' + ans.answer">
          <label class="form-check-label" :for="question.uid + '-' + ans.answer">
            {{ ans.answer }}
          </label>
        </div>
      </div>
    </div>
    <button class="btn btn-success mt-4 w-100" @click="submitQuiz">Submit Quiz</button>
    {% endverbatim %}
  </div>
</div>
<script src="https://unpkg.com/vue@3.0.0-rc.5/dist/vue.global.prod.js"></script>
<script>
const app = Vue.createApp({
  data() {
    return {
      questions: [],
      types: new URLSearchParams(window.location.search).get('types')
    }
  },
  mounted() {
    this.getQuestions();
  },
  methods: {
    getQuestions() {
      fetch(`/api/get-quiz/?types=${this.types}`)
        .then(response => response.json())
        .then(result => {
          this.questions = result.data;
        });
    },
    submitQuiz() {
      const answers = this.questions.map(q => ({
        uid: q.uid,
        selected: q.selected
      }));

      fetch('/submit-quiz/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': this.getCookie('csrftoken')
        },
        body: JSON.stringify({answers: answers, quiz_type: this.types})
      })
      .then(response => response.json())
      .then(result => {
        console.log("Submit quiz result:", result);  // Debug print
        // alert("Score received: " + result.score);  // Debug alert removed as per user request
        window.location.href = `/score/?score=${result.score}`;
      })
      .catch(error => {
        alert("Error submitting quiz: " + error);
        console.error(error);
      });
    },
    getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }
  }
});
app.mount('#app');
</script>
</body>
</html>
