{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
          crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'styles.css' %}">

    <title>Django Quiz App</title>
</head>
<body>
{% include 'navbar.html' %}
<div class="container mt-5 pt-5">
    <h1 style="color: green; text-align: center;">Quiz App</h1>

    <div class="col-md-6 mx-auto">
        <form action="">
            <div class="form-group">
                <label for="">Select Types</label>
                <select name="types" id="" class="form-control" value="types">
                    <option value="Choose">Choose</option>
                    {% for type in categories %}
                    <option value="{{type.name}}">{{type.name}}</option>
                    {% endfor %}
                </select>
            </div>
            <button class="btn btn-danger mt-3">Submit</button>
        </form>
    </div>
</div>

</body>
</html>
